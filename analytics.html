<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CCS Triggers Validation Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-800">

  <!-- Header -->
  <header class="bg-white shadow p-4 flex justify-between items-center">
    <div class="flex items-center space-x-2">
      <img src="datascout_logo.png" alt="DataScout Logo" class="h-8 w-8">
      <h1 class="text-xl font-bold">CCS Triggers Validation Dashboard</h1>
    </div>
    <div class="flex space-x-2">
      <input type="text" id="search-member" placeholder="🔍 Search Member ID" class="border rounded px-2 py-1 text-sm">
      <select class="border rounded px-2 py-1 text-sm" id="filter-action">
        <option value="">All Action Codes</option>
      </select>
    </div>
  </header>

  <!-- Layout -->
  <div class="flex">

    <!-- Sidebar -->
    <aside class="w-64 bg-white p-4 border-r space-y-4">
      <ul class="space-y-2">
        <li><a href="analytics.html" class="text-blue-600 hover:underline">Analytics</a></li>
      </ul>
    </aside>

    <!-- Main -->
    <main class="flex-1 p-6 space-y-6">

      <!-- Table -->
      <div class="bg-white rounded-xl shadow overflow-hidden">
        <table class="min-w-full text-sm text-left">
          <thead class="bg-gray-100">
            <tr>
              <th class="px-4 py-2 text-left font-semibold cursor-pointer" onclick="sortTable('member_id', this)">
                Member ID <span class="sort-arrow">⇅</span>
              </th>
              <th class="px-4 py-2 text-left font-semibold cursor-pointer" onclick="sortTable('name', this)">
                Name <span class="sort-arrow">⇅</span>
              </th>
              <th class="px-4 py-2 text-left font-semibold cursor-pointer" onclick="sortTable('action_reason', this)">
                Action Reason <span class="sort-arrow">⇅</span>
              </th>
              <th class="px-4 py-2 text-left font-semibold cursor-pointer" onclick="sortTable('action_code', this)">
                Action Code <span class="sort-arrow">⇅</span>
              </th>
              <th class="px-4 py-2 text-left font-semibold cursor-pointer" onclick="sortTable('created_at', this)">
                Created At <span class="sort-arrow">⇅</span>
              </th>
              <th class="px-4 py-2 text-left font-semibold cursor-pointer" onclick="sortTable('match_result', this)">
                Match? <span class="sort-arrow">⇅</span>
              </th>
              <th class="px-4 py-2 text-left font-semibold cursor-pointer" onclick="sortTable('notes', this)">
                Notes <span class="sort-arrow">⇅</span>
              </th>
            </tr>
          </thead>
          <tbody id="data-table-body"></tbody>
        </table>
      </div>

    </main>
  </div>

  <!-- Modal -->
  <div id="modal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center">
    <div class="bg-white p-6 rounded-xl shadow-lg max-w-2xl w-full">
      <h2 class="text-lg font-bold mb-2">Details</h2>
      <p id="modal-text" class="whitespace-pre-wrap"></p>
      <button onclick="closeModal()" class="mt-4 px-4 py-2 bg-blue-500 text-white rounded">Close</button>
    </div>
  </div>

  <!-- Script -->
  <script>
    let allData = [];
    let currentSort = { column: null, asc: true, element: null };

    async function loadData() {
      const res = await fetch("https://raw.githubusercontent.com/AndreDowbor/dashboard-project/main/data.json");
      allData = await res.json();
      renderTable(allData);
      populateActionFilter(allData);
    }

    function renderTable(data) {
      const tbody = document.querySelector("#data-table-body");
      tbody.innerHTML = "";

      if (data.length === 0) {
        tbody.innerHTML = `<tr><td colspan="7" class="p-4 text-center text-gray-500">No results found</td></tr>`;
        return;
      }

      data.forEach(row => {
        const safeReason = row.action_reason ? encodeURIComponent(row.action_reason) : "";
        const safeNotes  = row.notes ? encodeURIComponent(row.notes) : "";

        tbody.innerHTML += `
          <tr class="border-t ${row.match_result ? '' : 'bg-red-50'}">
            <td class="px-4 py-2">
              <a href="https://my.ccs.ca/CCSStaff/Account_Page_Staff.aspx?ID=${row.member_id}&WebsiteKey=4243d9e2-e91e-468c-97c2-2046d70c1e1a" 
                 target="_blank" 
                 class="text-blue-600 hover:underline">
                ${row.member_id}
              </a>
            </td>
            <td class="px-4 py-2">${row.first_name} ${row.last_name}</td>
            <td class="px-4 py-2 truncate max-w-xs ${row.action_reason ? 'cursor-pointer text-blue-600 underline' : ''}"
                data-text="${safeReason}" onclick="handleCellClick(this)">
              ${row.action_reason ? row.action_reason.substring(0,50) + (row.action_reason.length > 50 ? "..." : "") : ""}
            </td>
            <td class="px-4 py-2">${row.action_code}</td>
            <td class="px-4 py-2">${row.created_at}</td>
            <td class="px-4 py-2">${row.match_result ? "✅ Match" : "❌ No Match"}</td>
            <td class="px-4 py-2 truncate max-w-xs ${row.notes ? 'cursor-pointer underline' : ''}"
                data-text="${safeNotes}" onclick="handleCellClick(this)">
              ${row.notes ? row.notes.substring(0,40) + (row.notes.length > 40 ? "..." : "") : ""}
            </td>
          </tr>
        `;
      });
    }

    function populateActionFilter(data) {
      const select = document.getElementById("filter-action");
      const codes = [...new Set(data.map(r => r.action_code))];
      codes.forEach(code => {
        const opt = document.createElement("option");
        opt.value = code;
        opt.textContent = code;
        select.appendChild(opt);
      });

      select.addEventListener("change", () => {
        const val = select.value;
        const filtered = val ? allData.filter(r => r.action_code === val) : allData;
        renderTable(filtered);
      });
    }

    function handleCellClick(cell) {
      const encoded = cell.dataset.text || "";
      if (encoded.trim()) {
        const decoded = decodeURIComponent(encoded);
        openModal(decoded);
      }
    }

    function openModal(text) {
      document.getElementById("modal-text").innerText = text;
      document.getElementById("modal").classList.remove("hidden");
      document.getElementById("modal").classList.add("flex");
    }

    function closeModal() {
      document.getElementById("modal").classList.add("hidden");
      document.getElementById("modal").classList.remove("flex");
    }

    // Sorting
    function sortTable(column, thElement) {
      currentSort.asc = currentSort.column === column ? !currentSort.asc : true;
      currentSort.column = column;

      // Reset all arrows
      document.querySelectorAll(".sort-arrow").forEach(arrow => {
        arrow.textContent = "⇅";
        arrow.classList.remove("text-green-600", "text-red-600");
      });

      // Update active arrow
      if (currentSort.asc) {
        thElement.querySelector(".sort-arrow").textContent = "↑";
        thElement.querySelector(".sort-arrow").classList.add("text-green-600");
      } else {
        thElement.querySelector(".sort-arrow").textContent = "↓";
        thElement.querySelector(".sort-arrow").classList.add("text-red-600");
      }

      const sorted = [...allData].sort((a, b) => {
        let valA, valB;

        if (column === "name") {
          valA = (a.first_name + " " + a.last_name).toLowerCase();
          valB = (b.first_name + " " + b.last_name).toLowerCase();
        } else {
          valA = a[column];
          valB = b[column];
        }

        if (column === "member_id") {
          valA = parseInt(valA) || 0;
          valB = parseInt(valB) || 0;
        }

        if (column === "created_at") {
          valA = new Date(valA);
          valB = new Date(valB);
        }

        if (valA < valB) return currentSort.asc ? -1 : 1;
        if (valA > valB) return currentSort.asc ? 1 : -1;
        return 0;
      });

      renderTable(sorted);
    }

    // 🔍 Live Member ID search
    document.getElementById("search-member").addEventListener("input", e => {
      const term = e.target.value.trim();
      const filtered = term ? allData.filter(r => r.member_id.includes(term)) : allData;
      renderTable(filtered);
    });

    loadData();
  </script>
</body>
</html>
