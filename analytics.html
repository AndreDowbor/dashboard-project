<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CCS Triggers Validation Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-100 text-gray-800">

  <!-- Header -->
  <header class="bg-white shadow p-4 flex justify-between items-center">
    <div class="flex items-center space-x-2">
      <img src="datascout_logo.png" alt="DataScout Logo" class="h-8 w-8">
      <h1 class="text-xl font-bold">Analytics Dashboard</h1>
    </div>
    <div class="flex space-x-2">
      <select class="border rounded px-2 py-1 text-sm" id="filter-action">
        <option value="">All Action Codes</option>
      </select>
    </div>
  </header>

  <!-- Layout -->
  <div class="flex">

    <!-- Sidebar -->
    <aside class="w-64 bg-white p-4 border-r space-y-4">
      <ul class="space-y-2">
        <li><a href="index.html" class="text-blue-600 hover:underline">Messages Table</a></li>
      </ul>
    </aside>

    <!-- Main -->
    <main class="flex-1 p-6 space-y-6">

      <!-- KPI Cards -->
      <div class="grid grid-cols-3 gap-4">
        <div class="bg-white p-4 rounded-xl shadow">
          <p class="text-sm text-gray-500">📩 Total Messages</p>
          <p id="total" class="text-2xl font-bold">0</p>
        </div>
        <div class="bg-white p-4 rounded-xl shadow">
          <p class="text-sm text-gray-500">✅ Matches</p>
          <p id="matches" class="text-2xl font-bold text-green-600">0</p>
        </div>
        <div class="bg-white p-4 rounded-xl shadow">
          <p class="text-sm text-gray-500">❌ No Matches</p>
          <p id="noMatches" class="text-2xl font-bold text-red-600">0</p>
        </div>
        <div class="bg-white p-4 rounded-xl shadow">
          <p class="text-sm text-gray-500">🎯 Accuracy</p>
          <p id="accuracy" class="text-2xl font-bold">0%</p>
        </div>
        <div class="bg-white p-4 rounded-xl shadow">
          <p class="text-sm text-gray-500">⚡ New Trigger Needed</p>
          <p id="newTrigger" class="text-2xl font-bold text-yellow-600">0</p>
        </div>
        <div class="bg-white p-4 rounded-xl shadow">
          <p class="text-sm text-gray-500">✏️ Adjust Trigger Needed</p>
          <p id="adjustTrigger" class="text-2xl font-bold text-purple-600">0</p>
        </div>
      </div>

      <!-- Charts -->
      <div class="grid grid-cols-2 gap-4">
        <div class="bg-white p-4 rounded-xl shadow">
          <canvas id="trendChart"></canvas>
        </div>
        <div class="bg-white p-4 rounded-xl shadow">
          <canvas id="weeklyMessagesChart"></canvas>
        </div>
      </div>

    </main>
  </div>

  <!-- Script -->
  <script>
    let allData = [];

    async function loadData() {
      const res = await fetch("https://raw.githubusercontent.com/AndreDowbor/dashboard-project/main/data.json");
      allData = await res.json();
      updateAnalytics(allData);
      populateActionFilter(allData);
    }

    function updateAnalytics(data) {
      const total = data.length;
      const matches = data.filter(r => r.match_result).length;
      const noMatches = total - matches;
      const accuracy = total ? Math.round((matches/total) * 100) : 0;

      // Convert truthy strings/values into real booleans
      const parseBool = v => {
        if (typeof v === "boolean") return v;
        if (typeof v === "string") return v.trim().toLowerCase() === "true";
        return false;
      };

      const newTrigger = data.filter(r => parseBool(r.new_trigger_needed)).length;
      const adjustTrigger = data.filter(r => parseBool(r.trigger_adjust_needed)).length;

      document.getElementById("total").innerText = total;
      document.getElementById("matches").innerText = matches;
      document.getElementById("noMatches").innerText = noMatches;
      document.getElementById("accuracy").innerText = accuracy + "%";
      document.getElementById("newTrigger").innerText = newTrigger;
      document.getElementById("adjustTrigger").innerText = adjustTrigger;

      renderCharts(data);
    }

    function renderCharts(data) {
      // Trend Chart (Accuracy % by day)
      const byDate = {};
      data.forEach(r => {
        const d = r.created_at.split("T")[0];
        if (!byDate[d]) byDate[d] = { total: 0, matches: 0 };
        byDate[d].total++;
        if (r.match_result) byDate[d].matches++;
      });
      const labels = Object.keys(byDate).sort();
      const trendData = labels.map(d => Math.round((byDate[d].matches/byDate[d].total)*100));

      new Chart(document.getElementById("trendChart"), {
        type: 'line',
        data: {
          labels,
          datasets: [{
            label: 'Accuracy %',
            data: trendData,
            borderColor: "#10b981",
            fill: false
          }]
        }
      });

      // Weekly Messages Chart
      const weeklyCounts = {};
      data.forEach(r => {
        const date = new Date(r.created_at);
        if (!isNaN(date)) {
          const year = date.getFullYear();
          // ISO Week calculation
          const firstJan = new Date(year, 0, 1);
          const days = Math.floor((date - firstJan) / 86400000);
          const week = Math.ceil((days + firstJan.getDay() + 1) / 7);
          const key = `${year}-W${String(week).padStart(2, "0")}`;
          weeklyCounts[key] = (weeklyCounts[key] || 0) + 1;
        }
      });
      const weekLabels = Object.keys(weeklyCounts).sort();
      const weekValues = weekLabels.map(k => weeklyCounts[k]);

      new Chart(document.getElementById("weeklyMessagesChart"), {
        type: 'bar',
        data: {
          labels: weekLabels,
          datasets: [{
            label: 'Messages per Week',
            data: weekValues,
            backgroundColor: "#6366f1"
          }]
        },
        options: {
          scales: {
            y: { beginAtZero: true }
          }
        }
      });
    }

    function populateActionFilter(data) {
      const select = document.getElementById("filter-action");
      const codes = [...new Set(data.map(r => r.action_code))];
      codes.forEach(code => {
        const opt = document.createElement("option");
        opt.value = code;
        opt.textContent = code;
        select.appendChild(opt);
      });

      select.addEventListener("change", () => {
        const val = select.value;
        const filtered = val ? allData.filter(r => r.action_code === val) : allData;
        updateAnalytics(filtered);
      });
    }

    loadData();
  </script>
</body>
</html>
