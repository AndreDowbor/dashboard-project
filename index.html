<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI QA Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-800">

  <!-- Header -->
  <header class="bg-white shadow p-4 flex justify-between items-center">
    <div class="flex items-center space-x-2">
      <img src="datascout_logo.png" alt="DataScout Logo" class="h-8 w-8">
      <h1 class="text-xl font-bold">AI Message QA Dashboard</h1>
    </div>
    <div class="flex space-x-2">
      <input type="text" id="search-member" placeholder="🔍 Search Member ID" class="border rounded px-2 py-1 text-sm">
    </div>
  </header>

  <!-- Layout -->
  <div class="flex">

    <!-- Sidebar -->
    <aside class="w-64 bg-white p-4 border-r space-y-4">
      <h2 class="font-semibold mb-2">Filters</h2>
      <div>
        <label class="block text-sm font-medium">Action Code</label>
        <select class="w-full border rounded px-2 py-1" id="filter-action">
          <option value="">All</option>
        </select>
      </div>
    </aside>

    <!-- Main -->
    <main class="flex-1 p-6 space-y-6">

      <!-- Table -->
      <div class="bg-white rounded-xl shadow overflow-hidden">
        <table class="min-w-full text-sm text-left">
          <thead class="bg-gray-100 cursor-pointer">
            <tr>
              <th class="p-2" onclick="sortTable('member_id')">Member ID ⬍</th>
              <th class="p-2" onclick="sortTable('name')">Name ⬍</th>
              <th class="p-2" onclick="sortTable('action_reason')">Action Reason ⬍</th>
              <th class="p-2" onclick="sortTable('action_code')">Action Code ⬍</th>
              <th class="p-2" onclick="sortTable('created_at')">Created At ⬍</th>
              <th class="p-2" onclick="sortTable('match_result')">Match? ⬍</th>
              <th class="p-2" onclick="sortTable('Notes')">Notes ⬍</th>
            </tr>
          </thead>
          <tbody id="data-table-body"></tbody>
        </table>
      </div>

    </main>
  </div>

  <!-- Modal -->
  <div id="modal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center">
    <div class="bg-white p-6 rounded-xl shadow-lg max-w-2xl w-full">
      <h2 class="text-lg font-bold mb-2">Details</h2>
      <p id="modal-text" class="whitespace-pre-wrap"></p>
      <button onclick="closeModal()" class="mt-4 px-4 py-2 bg-blue-500 text-white rounded">Close</button>
    </div>
  </div>

  <!-- Script -->
  <script>
    let allData = [];
    let currentSort = { column: null, asc: true };

    async function loadData() {
      const res = await fetch("https://raw.githubusercontent.com/AndreDowbor/dashboard-project/main/data.json");
      allData = await res.json();
      renderTable(allData);
      populateActionFilter(allData);
    }

    function renderTable(data) {
      const tbody = document.querySelector("#data-table-body");
      tbody.innerHTML = "";

      if (data.length === 0) {
        tbody.innerHTML = `<tr><td colspan="7" class="p-4 text-center text-gray-500">No results found</td></tr>`;
        return;
      }

      data.forEach(row => {
        const safeReason = row.action_reason ? encodeURIComponent(row.action_reason) : "";
        const safeNotes  = row.Notes ? encodeURIComponent(row.Notes) : "";

        tbody.innerHTML += `
          <tr class="border-t ${row.match_result ? '' : 'bg-red-50'}">
            <td class="p-2">${row.member_id}</td>
            <td class="p-2">${row.first_name} ${row.last_name}</td>

            <td class="p-2 truncate max-w-xs ${row.action_reason ? 'cursor-pointer text-blue-600 underline' : ''}"
                data-text="${safeReason}" onclick="handleCellClick(this)">
              ${row.action_reason ? row.action_reason.substring(0,50) + (row.action_reason.length > 50 ? "..." : "") : ""}
            </td>

            <td class="p-2">${row.action_code}</td>
            <td class="p-2">${row.created_at}</td>
            <td class="p-2">${row.match_result ? "✅ Match" : "❌ No Match"}</td>

            <td class="p-2 truncate max-w-xs ${row.Notes ? 'cursor-pointer underline' : ''}"
                data-text="${safeNotes}" onclick="handleCellClick(this)">
              ${row.Notes ? row.Notes.substring(0,40) + (row.Notes.length > 40 ? "..." : "") : ""}
            </td>
          </tr>
        `;
      });
    }

    function populateActionFilter(data) {
      const select = document.getElementById("filter-action");
      const codes = [...new Set(data.map(r => r.action_code))];
      codes.forEach(code => {
        const opt = document.createElement("option");
        opt.value = code;
        opt.textContent = code;
        select.appendChild(opt);
      });

      select.addEventListener("change", () => {
        const val = select.value;
        const filtered = val ? allData.filter(r => r.action_code === val) : allData;
        renderTable(filtered);
      });
    }

    function handleCellClick(cell) {
      const encoded = cell.dataset.text || "";
      if (encoded.trim()) {
        const decoded = decodeURIComponent(encoded);
        openModal(decoded);
      }
    }

    function openModal(text) {
      document.getElementById("modal-text").innerText = text;
      document.getElementById("modal").classList.remove("hidden");
      document.getElementById("modal").classList.add("flex");
    }

    function closeModal() {
      document.getElementById("modal").classList.add("hidden");
      document.getElementById("modal").classList.remove("flex");
    }

    // Sorting
    function sortTable(column) {
      currentSort.asc = currentSort.column === column ? !currentSort.asc : true;
      currentSort.column = column;

      const sorted = [...allData].sort((a, b) => {
        let valA, valB;

        if (column === "name") {
          valA = (a.first_name + " " + a.last_name).toLowerCase();
          valB = (b.first_name + " " + b.last_name).toLowerCase();
        } else {
          valA = a[column];
          valB = b[column];
        }

        if (column === "member_id") {
          valA = parseInt(valA) || 0;
          valB = parseInt(valB) || 0;
        }

        if (column === "created_at") {
          valA = new Date(valA);
          valB = new Date(valB);
        }

        if (valA < valB) return currentSort.asc ? -1 : 1;
        if (valA > valB) return currentSort.asc ? 1 : -1;
        return 0;
      });

      renderTable(sorted);
    }

    // 🔍 Live Member ID search
    document.getElementById("search-member").addEventListener("input", e => {
      const term = e.target.value.trim();
      const filtered = term ? allData.filter(r => r.member_id.includes(term)) : allData;
      renderTable(filtered);
    });

    loadData();
  </script>
</body>
</html>
