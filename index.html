<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI QA Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-100 text-gray-800">

  <!-- Header -->
  <header class="bg-white shadow p-4 flex justify-between items-center">
    <h1 class="text-xl font-bold">📊 AI Message QA Dashboard</h1>
    <div class="flex space-x-2">
      <input type="date" class="border rounded px-2 py-1 text-sm">
      <input type="date" class="border rounded px-2 py-1 text-sm">
      <input type="text" placeholder="Search..." class="border rounded px-2 py-1 text-sm">
    </div>
  </header>

  <!-- Layout -->
  <div class="flex">

    <!-- Sidebar -->
    <aside class="w-64 bg-white p-4 border-r space-y-4">
      <h2 class="font-semibold mb-2">Filters</h2>
      <div>
        <label class="block text-sm font-medium">Action Code</label>
        <select class="w-full border rounded px-2 py-1" id="filter-action">
          <option value="">All</option>
        </select>
      </div>
    </aside>

    <!-- Main -->
    <main class="flex-1 p-6 space-y-6">

      <!-- Summary Cards -->
      <div class="grid grid-cols-4 gap-4">
        <div class="bg-white p-4 rounded-xl shadow">
          <p class="text-sm text-gray-500">Total Messages</p>
          <p id="total-messages" class="text-2xl font-bold">0</p>
        </div>
        <div class="bg-white p-4 rounded-xl shadow">
          <p class="text-sm text-gray-500">✅ Matches</p>
          <p id="matches" class="text-2xl font-bold text-green-600">0</p>
        </div>
        <div class="bg-white p-4 rounded-xl shadow">
          <p class="text-sm text-gray-500">❌ No Matches</p>
          <p id="no-matches" class="text-2xl font-bold text-red-600">0</p>
        </div>
        <div class="bg-white p-4 rounded-xl shadow">
          <p class="text-sm text-gray-500">🎯 Accuracy</p>
          <p id="accuracy" class="text-2xl font-bold">0%</p>
        </div>
      </div>

      <!-- Charts -->
      <div class="grid grid-cols-3 gap-4">
        <div class="bg-white p-4 rounded-xl shadow"><canvas id="pieChart"></canvas></div>
        <div class="bg-white p-4 rounded-xl shadow"><canvas id="barChart"></canvas></div>
        <div class="bg-white p-4 rounded-xl shadow"><canvas id="lineChart"></canvas></div>
      </div>

      <!-- Data Table -->
      <div class="bg-white rounded-xl shadow overflow-hidden">
        <table class="min-w-full text-sm text-left">
          <thead class="bg-gray-100">
            <tr>
              <th class="p-2">Member ID</th>
              <th class="p-2">Name</th>
              <th class="p-2">Action Reason</th>
              <th class="p-2">Action Code</th>
              <th class="p-2">Created At</th>
              <th class="p-2">Match?</th>
              <th class="p-2">Notes</th>
            </tr>
          </thead>
          <tbody id="data-table-body"></tbody>
        </table>
      </div>

    </main>
  </div>

  <!-- Modal -->
  <div id="modal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center">
    <div class="bg-white p-6 rounded-xl shadow-lg max-w-2xl w-full max-h-[80vh] overflow-y-auto">
      <h2 class="text-lg font-bold mb-2">Details</h2>
      <p id="modal-text" class="whitespace-pre-wrap"></p>
      <button onclick="closeModal()" class="mt-4 px-4 py-2 bg-blue-500 text-white rounded">Close</button>
    </div>
  </div>

  <!-- Script -->
  <script>
    async function loadData() {
      const res = await fetch("https://raw.githubusercontent.com/AndreDowbor/dashboard-project/main/data.json");
      const data = await res.json();
      console.log("Loaded notes:", data.map(r => r.notes)); // DEBUG
      renderTable(data);
      updateSummary(data);
      renderCharts(data);
      populateActionFilter(data);
    }

    function renderTable(data) {
      const tbody = document.querySelector("#data-table-body");
      tbody.innerHTML = "";

      data.forEach(row => {
        // Escape quotes safely for onclick
        const safeReason = row.action_reason
          ? row.action_reason.replace(/'/g, "&#39;").replace(/"/g, "&quot;")
          : "";
        const safeNotes = row.notes
          ? row.notes.replace(/'/g, "&#39;").replace(/"/g, "&quot;")
          : "";

        tbody.innerHTML += `
          <tr class="border-t ${row.match_result ? '' : 'bg-red-50'}">
            <td class="p-2">#${row.member_id}</td>
            <td class="p-2">${row.first_name} ${row.last_name}</td>

            <!-- Action Reason -->
            <td class="p-2 truncate max-w-xs ${row.action_reason ? 'cursor-pointer text-blue-600 underline' : ''}" 
                onclick="${row.action_reason ? `openModal('${safeReason}')` : ''}">
              ${row.action_reason 
                ? row.action_reason.substring(0,50) + (row.action_reason.length > 50 ? "..." : "") 
                : ""}
            </td>

            <td class="p-2">${row.action_code}</td>
            <td class="p-2">${row.created_at}</td>
            <td class="p-2">${row.match_result ? "✅ Match" : "❌ No Match"}</td>

            <!-- Notes -->
            <td class="p-2 truncate max-w-xs ${row.notes && row.notes.trim() ? 'cursor-pointer text-red-600 underline' : ''}" 
                onclick="${row.notes && row.notes.trim() ? `openModal('${safeNotes}')` : ''}">
              ${row.notes && row.notes.trim() 
                ? row.notes.substring(0,40) + (row.notes.length > 40 ? "..." : "") 
                : ""}
            </td>
          </tr>
        `;
      });
    }

    function updateSummary(data) {
      const total = data.length;
      const matches = data.filter(r => r.match_result).length;
      const noMatches = total - matches;
      const accuracy = total > 0 ? Math.round((matches / total) * 100) : 0;

      document.getElementById("total-messages").innerText = total;
      document.getElementById("matches").innerText = matches;
      document.getElementById("no-matches").innerText = noMatches;
      document.getElementById("accuracy").innerText = accuracy + "%";
    }

    function renderCharts(data) {
      const matches = data.filter(r => r.match_result).length;
      const noMatches = data.length - matches;

      // Pie Chart
      new Chart(document.getElementById("pieChart"), {
        type: 'pie',
        data: {
          labels: ["Matches", "No Matches"],
          datasets: [{
            data: [matches, noMatches],
            backgroundColor: ["#34d399", "#f87171"]
          }]
        }
      });

      // Bar Chart by action_code
      const codes = [...new Set(data.map(r => r.action_code))];
      const accuracyPerCode = codes.map(code => {
        const subset = data.filter(r => r.action_code === code);
        const matchCount = subset.filter(r => r.match_result).length;
        return subset.length > 0 ? Math.round((matchCount / subset.length) * 100) : 0;
      });

      new Chart(document.getElementById("barChart"), {
        type: 'bar',
        data: {
          labels: codes,
          datasets: [{
            label: 'Accuracy %',
            data: accuracyPerCode,
            backgroundColor: "#60a5fa"
          }]
        },
        options: { scales: { y: { beginAtZero: true, max: 100 } } }
      });

      // Line Chart accuracy over time
      const byDate = {};
      data.forEach(r => {
        const date = r.created_at.split("T")[0]; // YYYY-MM-DD
        if (!byDate[date]) byDate[date] = { total: 0, matches: 0 };
        byDate[date].total++;
        if (r.match_result) byDate[date].matches++;
      });
      const dates = Object.keys(byDate).sort();
      const accuracyTrend = dates.map(d => Math.round((byDate[d].matches / byDate[d].total) * 100));

      new Chart(document.getElementById("lineChart"), {
        type: 'line',
        data: {
          labels: dates,
          datasets: [{
            label: 'Accuracy %',
            data: accuracyTrend,
            borderColor: "#10b981",
            fill: false
          }]
        },
        options: { responsive: true }
      });
    }

    function populateActionFilter(data) {
      const select = document.getElementById("filter-action");
      const codes = [...new Set(data.map(r => r.action_code))];
      codes.forEach(code => {
        const opt = document.createElement("option");
        opt.value = code;
        opt.textContent = code;
        select.appendChild(opt);
      });
    }

    function openModal(text) {
      document.getElementById("modal-text").innerText = text;
      document.getElementById("modal").classList.remove("hidden");
      document.getElementById("modal").classList.add("flex");
    }

    function closeModal() {
      document.getElementById("modal").classList.add("hidden");
      document.getElementById("modal").classList.remove("flex");
    }

    loadData();
  </script>
</body>
</html>
