<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Action Monitoring Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-800">

  <!-- Header -->
  <header class="bg-white shadow p-4 flex justify-between items-center">
    <h1 class="text-xl font-bold">📊 Action Monitoring Dashboard</h1>
    <div class="flex space-x-2">
      <input type="date" class="border rounded px-2 py-1 text-sm">
      <input type="date" class="border rounded px-2 py-1 text-sm">
      <input type="text" placeholder="Search..." class="border rounded px-2 py-1 text-sm">
    </div>
  </header>

  <!-- Layout -->
  <div class="flex">

    <!-- Sidebar -->
    <aside class="w-64 bg-white p-4 border-r space-y-4">
      <h2 class="font-semibold mb-2">Filters</h2>
      <div>
        <label class="block text-sm font-medium">Action Code</label>
        <select class="w-full border rounded px-2 py-1">
          <option>All</option>
          <option>Code A</option>
          <option>Code B</option>
        </select>
      </div>
      <div>
        <label class="block text-sm font-medium">Confidence Score</label>
        <input type="range" min="0" max="100" class="w-full">
      </div>
      <div>
        <label class="block text-sm font-medium">Staff Involvement</label>
        <select class="w-full border rounded px-2 py-1">
          <option>All</option>
          <option>Staff Only</option>
          <option>System Only</option>
        </select>
      </div>
    </aside>

    <!-- Main -->
    <main class="flex-1 p-6 space-y-6">

      <!-- Summary Cards -->
      <div class="grid grid-cols-3 gap-4">
        <div class="bg-white p-4 rounded-xl shadow">
          <p class="text-sm text-gray-500">Total Members</p>
          <p id="total-members" class="text-2xl font-bold">0</p>
        </div>
        <div class="bg-white p-4 rounded-xl shadow">
          <p class="text-sm text-gray-500">Staff Adjustments</p>
          <p id="staff-adjustments" class="text-2xl font-bold">0</p>
        </div>
        <div class="bg-white p-4 rounded-xl shadow">
          <p class="text-sm text-gray-500">Avg Confidence</p>
          <p id="avg-confidence" class="text-2xl font-bold">0%</p>
        </div>
      </div>

      <!-- Charts Placeholder -->
      <div class="grid grid-cols-3 gap-4">
        <div class="bg-white h-48 rounded-xl shadow flex items-center justify-center">[Pie Chart]</div>
        <div class="bg-white h-48 rounded-xl shadow flex items-center justify-center">[Bar Chart]</div>
        <div class="bg-white h-48 rounded-xl shadow flex items-center justify-center">[Line Chart]</div>
      </div>

      <!-- Data Table -->
      <div class="bg-white rounded-xl shadow overflow-hidden">
        <table class="min-w-full text-sm text-left">
          <thead class="bg-gray-100">
            <tr>
              <th class="p-2">Member ID</th>
              <th class="p-2">Name</th>
              <th class="p-2">Action Reason</th>
              <th class="p-2">Action Code</th>
              <th class="p-2">Confidence</th>
              <th class="p-2">Created At</th>
              <th class="p-2">Trigger</th>
              <th class="p-2">Staff</th>
              <th class="p-2">Notes</th>
            </tr>
          </thead>
          <tbody id="data-table-body"></tbody>
        </table>
      </div>

    </main>
  </div>

  <!-- Script to load data -->
  <script>
    async function loadData() {
      const res = await fetch("https://raw.githubusercontent.com/AndreDowbor/dashboard-project/main/data.json");
      const data = await res.json();
      renderTable(data);
      updateSummary(data);
    }

    function renderTable(data) {
      const tbody = document.querySelector("#data-table-body");
      tbody.innerHTML = "";
      data.forEach(row => {
        tbody.innerHTML += `
          <tr class="border-t hover:bg-gray-50 cursor-pointer">
            <td class="p-2">#${row.member_id}</td>
            <td class="p-2">${row.first_name} ${row.last_name}</td>
            <td class="p-2">${row.action_reason}</td>
            <td class="p-2">${row.action_code}</td>
            <td class="p-2">
              <span class="px-2 py-1 rounded ${
                row.action_confidence_score > 70 ? "bg-green-100 text-green-700" :
                row.action_confidence_score > 40 ? "bg-yellow-100 text-yellow-700" :
                "bg-red-100 text-red-700"
              }">${row.action_confidence_score}%</span>
            </td>
            <td class="p-2">${row.created_at}</td>
            <td class="p-2">${row.trigger_matches ? "✅ Match" : row.new_trigger_needed ? "⚠️ New Trigger" : "✏️ Adjust"}</td>
            <td class="p-2">${row.made_by_staff ? "Yes ("+row.staff_name_id+")" : "No"}</td>
            <td class="p-2">${row.notes}</td>
          </tr>
        `;
      });
    }

    function updateSummary(data) {
      document.getElementById("total-members").innerText = data.length;
      const staffCount = data.filter(r => r.made_by_staff).length;
      document.getElementById("staff-adjustments").innerText = staffCount;
      const avg = Math.round(data.reduce((a,b)=>a+b.action_confidence_score,0)/data.length);
      document.getElementById("avg-confidence").innerText = avg + "%";
    }

    loadData();
  </script>
</body>
</html>
